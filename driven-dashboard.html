<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driven — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744;
    --navy-deep: #0f1a2e;
    --navy-mid: #243358;
    --cream: #f8f4ed;
    --cream-warm: #f2ead8;
    --gold: #c4913a;
    --gold-light: #d4a855;
    --gold-pale: #f0e4c8;
    --slate: #6b85b8;
    --text-dark: #1a1a2e;
    --text-mid: #3d4a6b;
    --text-light: #7a8aaa;
    --white: #ffffff;
    --shadow-card: 0 2px 12px rgba(26,39,68,0.10);
    --shadow-hover: 0 8px 32px rgba(26,39,68,0.16);
    --radius: 4px;
    --radius-lg: 8px;

    /* Driver colors */
    --mg: #2d6a4f;
    --pi: #1d4e89;
    --cp: #6b3fa0;
    --lv: #8b2020;
    --ai: #1a6e8e;
    --ee: #4a5e20;
    --ra: #9a6010;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* ---- LOGIN ---- */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--navy-deep);
  }

  .login-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-lg);
    padding: 48px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .login-logo {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 4px;
  }

  .login-logo span { color: var(--gold); }

  .login-sub {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 36px;
  }

  .login-input {
    width: 100%;
    padding: 14px 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    text-align: center;
    letter-spacing: 4px;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .login-input:focus { border-color: var(--gold); }
  .login-input::placeholder { letter-spacing: 1px; color: rgba(255,255,255,0.3); }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .login-btn:hover { background: var(--gold-light); }

  .login-error {
    color: #e07070;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* ---- DASHBOARD ---- */
  #dashboard-screen { display: none; }

  .dash-topbar {
    background: var(--navy-deep);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .dash-brand {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--white);
  }

  .dash-brand span { color: var(--gold); }

  .dash-brand-sub {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-left: 12px;
  }

  .dash-refresh {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius);
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .dash-refresh:hover { background: rgba(255,255,255,0.12); color: var(--white); }

  .dash-body {
    padding: 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .dash-row {
    display: grid;
    gap: 20px;
    margin-bottom: 20px;
  }

  .dash-row-3 { grid-template-columns: repeat(3, 1fr); }
  .dash-row-2 { grid-template-columns: 1fr 1fr; }
  .dash-row-1 { grid-template-columns: 1fr; }

  @media (max-width: 900px) {
    .dash-row-3 { grid-template-columns: 1fr 1fr; }
    .dash-row-2 { grid-template-columns: 1fr; }
    .dash-body { padding: 24px; }
  }

  @media (max-width: 600px) {
    .dash-row-3 { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--white);
    border-radius: var(--radius-lg);
    border: 1px solid rgba(26,39,68,0.08);
    box-shadow: var(--shadow-card);
    padding: 28px;
    position: relative;
    overflow: hidden;
  }

  .card-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 10px;
  }

  .card-value {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 6px;
  }

  .card-sub {
    font-size: 13px;
    color: var(--text-light);
    font-family: 'Source Serif 4', serif;
    font-style: italic;
  }

  .card-accent {
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    border-radius: 0 var(--radius-lg) 0 80px;
    opacity: 0.08;
  }

  /* Bar chart */
  .chart-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 24px;
  }

  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .bar-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-mid);
    width: 190px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-track {
    flex: 1;
    height: 28px;
    background: var(--cream-warm);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease 0.2s;
    width: 0%;
    display: flex;
    align-items: center;
    padding-left: 10px;
  }

  .bar-fill-label {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
    white-space: nowrap;
  }

  .bar-count {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-light);
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Donut chart */
  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .donut-svg { flex-shrink: 0; }

  .donut-legend {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-label {
    font-size: 13px;
    color: var(--text-mid);
    flex: 1;
  }

  .legend-pct {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dark);
  }

  /* Combo heatmap */
  .combo-grid {
    display: grid;
    gap: 8px;
  }

  .combo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--cream);
    border-radius: var(--radius);
    transition: background 0.15s;
  }

  .combo-row:hover { background: var(--cream-warm); }

  .combo-rank {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-light);
    width: 20px;
    flex-shrink: 0;
  }

  .combo-drivers {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dark);
  }

  .combo-secondary {
    font-size: 12px;
    color: var(--text-light);
    font-weight: 400;
  }

  .combo-count {
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    background: var(--gold-pale);
    padding: 3px 10px;
    border-radius: 12px;
  }

  /* Recent table */
  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-light);
    padding: 0 12px 12px;
    text-align: left;
    border-bottom: 1px solid rgba(26,39,68,0.08);
  }

  .data-table td {
    padding: 12px;
    font-size: 14px;
    color: var(--text-mid);
    border-bottom: 1px solid rgba(26,39,68,0.05);
    font-family: 'Source Serif 4', serif;
  }

  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(248,244,237,0.6); }

  .driver-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
  }

  .tier-badge {
    font-size: 11px;
    color: var(--text-light);
    background: var(--cream-warm);
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-light);
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 15px;
  }

  .loading {
    text-align: center;
    padding: 32px;
    color: var(--text-light);
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* Insight box */
  .insight-box {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 20px;
  }

  .insight-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 12px;
  }

  .insight-text {
    font-family: 'Source Serif 4', serif;
    font-size: 16px;
    color: rgba(255,255,255,0.85);
    line-height: 1.75;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeUp 0.5s ease forwards; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">D<span>r</span>iven</div>
    <div class="login-sub">Dashboard</div>
    <input type="password" class="login-input" id="pass-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPass()">
    <button class="login-btn" onclick="checkPass()">Access Dashboard</button>
    <div class="login-error" id="login-error">Incorrect password</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen">
  <div class="dash-topbar">
    <div style="display:flex;align-items:center;">
      <div class="dash-brand">D<span>r</span>iven</div>
      <span class="dash-brand-sub">Analytics Dashboard</span>
    </div>
    <button class="dash-refresh" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M1 6.5a5.5 5.5 0 1 0 1.1-3.3M1 2v3h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Refresh Data
    </button>
  </div>

  <div class="dash-body" id="dash-body">
    <div class="loading">Loading assessment data...</div>
  </div>
</div>

<script>
// ============================================================
// CONFIG — update password and Sheet ID here
// ============================================================
const DASHBOARD_PASSWORD = 'driven2025';
const SHEET_ID = ''; // Paste your Google Sheet ID here
const SHEET_NAME = 'Form Responses 1';

// Driver colors matching the assessment
const DRIVER_COLORS = {
  'Mastery & Growth':         '#2d6a4f',
  'Purpose & Impact':         '#1d4e89',
  'Connection & People':      '#6b3fa0',
  'Leadership & Vision':      '#8b2020',
  'Autonomy & Innovation':    '#1a6e8e',
  'Execution & Excellence':   '#4a5e20',
  'Recognition & Advancement':'#9a6010',
};

const ALL_DRIVERS = Object.keys(DRIVER_COLORS);

// ============================================================
// LOGIN
// ============================================================
function checkPass() {
  const val = document.getElementById('pass-input').value;
  if (val === DASHBOARD_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-screen').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pass-input').value = '';
  }
}

// ============================================================
// DATA LOADING
// ============================================================
async function loadData() {
  const body = document.getElementById('dash-body');
  body.innerHTML = '<div class="loading">Loading assessment data...</div>';

  if (!SHEET_ID) {
    renderDashboard(getSampleData());
    return;
  }

  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(47, text.length - 2));
    const rows = parseSheetData(json);
    renderDashboard(rows);
  } catch(e) {
    body.innerHTML = `<div class="empty-state">Could not load data. Make sure the Google Sheet is publicly shared and the Sheet ID is set correctly.<br><br><small>${e.message}</small></div>`;
  }
}

function parseSheetData(json) {
  const rows = [];
  const dataRows = json.table.rows;
  dataRows.forEach(row => {
    if (!row.c || !row.c[2] || !row.c[2].v) return; // skip empty
    rows.push({
      timestamp:  row.c[0]?.v || '',
      role_tier:  row.c[1]?.v || '',
      top_driver: row.c[2]?.v || '',
      secondary:  row.c[3]?.v || '',
    });
  });
  return rows;
}

// Sample data for when no Sheet ID is set yet
function getSampleData() {
  return [
    {timestamp:'2025-04-01',role_tier:'Individual Contributor',top_driver:'Connection & People',secondary:'Purpose & Impact'},
    {timestamp:'2025-04-01',role_tier:'People Manager',top_driver:'Mastery & Growth',secondary:'Execution & Excellence'},
    {timestamp:'2025-04-02',role_tier:'Individual Contributor',top_driver:'Autonomy & Innovation',secondary:'Mastery & Growth'},
    {timestamp:'2025-04-02',role_tier:'Leader of Leaders',top_driver:'Leadership & Vision',secondary:'Purpose & Impact'},
    {timestamp:'2025-04-03',role_tier:'People Manager',top_driver:'Connection & People',secondary:'Leadership & Vision'},
    {timestamp:'2025-04-03',role_tier:'Individual Contributor',top_driver:'Purpose & Impact',secondary:'Connection & People'},
    {timestamp:'2025-04-04',role_tier:'Individual Contributor',top_driver:'Recognition & Advancement',secondary:'Leadership & Vision'},
    {timestamp:'2025-04-04',role_tier:'People Manager',top_driver:'Execution & Excellence',secondary:'Mastery & Growth'},
    {timestamp:'2025-04-05',role_tier:'Individual Contributor',top_driver:'Connection & People',secondary:'Autonomy & Innovation'},
    {timestamp:'2025-04-05',role_tier:'Leader of Leaders',top_driver:'Purpose & Impact',secondary:'Leadership & Vision'},
  ];
}

// ============================================================
// RENDER
// ============================================================
function renderDashboard(rows) {
  const body = document.getElementById('dash-body');
  body.innerHTML = '';

  if (rows.length === 0) {
    body.innerHTML = '<div class="empty-state">No assessment data yet. Share the Driven assessment link to start collecting results.</div>';
    return;
  }

  // Compute stats
  const total = rows.length;
  const tierCounts = { 'Individual Contributor':0, 'People Manager':0, 'Leader of Leaders':0 };
  const topCounts = {};
  const secondaryCounts = {};
  const comboCounts = {};

  ALL_DRIVERS.forEach(d => { topCounts[d] = 0; secondaryCounts[d] = 0; });

  rows.forEach(r => {
    if (tierCounts[r.role_tier] !== undefined) tierCounts[r.role_tier]++;
    if (topCounts[r.top_driver] !== undefined) topCounts[r.top_driver]++;
    if (secondaryCounts[r.secondary] !== undefined) secondaryCounts[r.secondary]++;
    const combo = `${r.top_driver} + ${r.secondary}`;
    comboCounts[combo] = (comboCounts[combo] || 0) + 1;
  });

  const sortedTop = Object.entries(topCounts).sort((a,b) => b[1]-a[1]);
  const sortedCombos = Object.entries(comboCounts).sort((a,b) => b[1]-a[1]).slice(0, 8);
  const topDriver = sortedTop[0][0];
  const topDriverCount = sortedTop[0][1];
  const topPct = Math.round((topDriverCount/total)*100);

  // Insight
  const insightEl = document.createElement('div');
  insightEl.className = 'insight-box fade-in';
  insightEl.innerHTML = `
    <div class="insight-label">Snapshot Insight</div>
    <div class="insight-text">${generateInsight(rows, sortedTop, tierCounts, total)}</div>
  `;
  body.appendChild(insightEl);

  // Stat cards row
  const statsRow = document.createElement('div');
  statsRow.className = 'dash-row dash-row-3 fade-in';
  statsRow.innerHTML = `
    ${statCard('Total Assessments', total, 'completed to date', '#c4913a')}
    ${statCard('Top Driver', shortName(topDriver), `${topPct}% of respondents`, DRIVER_COLORS[topDriver])}
    ${statCard('Managers', tierCounts['People Manager'] + tierCounts['Leader of Leaders'], 'of ' + total + ' respondents', '#1a2744')}
  `;
  body.appendChild(statsRow);

  // Driver distribution + tier breakdown
  const midRow = document.createElement('div');
  midRow.className = 'dash-row dash-row-2 fade-in';

  // Driver bar chart
  const chartCard = document.createElement('div');
  chartCard.className = 'card';
  chartCard.innerHTML = `<div class="chart-title">Driver Distribution</div><div class="bar-chart" id="bar-chart"></div>`;
  midRow.appendChild(chartCard);

  // Tier donut
  const donutCard = document.createElement('div');
  donutCard.className = 'card';
  donutCard.innerHTML = `
    <div class="chart-title">Role Tier Breakdown</div>
    <div class="donut-wrap">
      <svg class="donut-svg" width="140" height="140" viewBox="0 0 140 140" id="donut-svg"></svg>
      <div class="donut-legend" id="donut-legend"></div>
    </div>
  `;
  midRow.appendChild(donutCard);
  body.appendChild(midRow);

  // Combo + recent
  const bottomRow = document.createElement('div');
  bottomRow.className = 'dash-row dash-row-2 fade-in';

  const comboCard = document.createElement('div');
  comboCard.className = 'card';
  comboCard.innerHTML = `<div class="chart-title">Top Driver Combinations</div><div class="combo-grid" id="combo-grid"></div>`;
  bottomRow.appendChild(comboCard);

  const recentCard = document.createElement('div');
  recentCard.className = 'card';
  recentCard.innerHTML = `<div class="chart-title">Recent Completions</div><div id="recent-table"></div>`;
  bottomRow.appendChild(recentCard);

  body.appendChild(bottomRow);

  // Render charts
  setTimeout(() => {
    renderBarChart(sortedTop, total);
    renderDonut(tierCounts, total);
    renderCombos(sortedCombos);
    renderRecent(rows.slice(-10).reverse());
  }, 100);
}

function statCard(label, value, sub, color) {
  return `
    <div class="card">
      <div class="card-accent" style="background:${color}"></div>
      <div class="card-label">${label}</div>
      <div class="card-value" style="color:${color}">${value}</div>
      <div class="card-sub">${sub}</div>
    </div>
  `;
}

function shortName(name) {
  const map = {
    'Mastery & Growth': 'Mastery',
    'Purpose & Impact': 'Purpose',
    'Connection & People': 'Connection',
    'Leadership & Vision': 'Leadership',
    'Autonomy & Innovation': 'Autonomy',
    'Execution & Excellence': 'Execution',
    'Recognition & Advancement': 'Recognition',
  };
  return map[name] || name;
}

function renderBarChart(sortedTop, total) {
  const container = document.getElementById('bar-chart');
  if (!container) return;
  const max = sortedTop[0][1];
  container.innerHTML = sortedTop.map(([driver, count]) => {
    const pct = max > 0 ? Math.round((count/max)*100) : 0;
    const color = DRIVER_COLORS[driver];
    return `
      <div class="bar-row">
        <div class="bar-name">${driver}</div>
        <div class="bar-track">
          <div class="bar-fill" data-pct="${pct}" style="background:${color};width:0%">
            ${count > 0 ? `<span class="bar-fill-label">${count}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');

  setTimeout(() => {
    container.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 50);
}

function renderDonut(tierCounts, total) {
  const svg = document.getElementById('donut-svg');
  const legend = document.getElementById('donut-legend');
  if (!svg || !legend) return;

  const tiers = [
    { label: 'Individual Contributor', color: '#1a2744', short: 'IC' },
    { label: 'People Manager', color: '#c4913a', short: 'Mgr' },
    { label: 'Leader of Leaders', color: '#6b85b8', short: 'LoL' },
  ];

  const cx = 70, cy = 70, r = 50, strokeW = 22;
  const circumference = 2 * Math.PI * r;
  let offset = 0;
  let svgContent = '';

  // Background circle
  svgContent += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f2ead8" stroke-width="${strokeW}"/>`;

  tiers.forEach(tier => {
    const count = tierCounts[tier.label] || 0;
    const pct = total > 0 ? count/total : 0;
    const dash = pct * circumference;
    const gap = circumference - dash;
    const rotation = (offset * 360) - 90;
    svgContent += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${tier.color}" stroke-width="${strokeW}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="0" transform="rotate(${rotation} ${cx} ${cy})" style="transition:stroke-dasharray 1s ease"/>`;
    offset += pct;
  });

  // Center text
  svgContent += `<text x="${cx}" y="${cy-6}" text-anchor="middle" font-family="Playfair Display,serif" font-size="22" font-weight="700" fill="#1a2744">${total}</text>`;
  svgContent += `<text x="${cx}" y="${cy+12}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#7a8aaa">total</text>`;

  svg.innerHTML = svgContent;

  legend.innerHTML = tiers.map(tier => {
    const count = tierCounts[tier.label] || 0;
    const pct = total > 0 ? Math.round((count/total)*100) : 0;
    return `
      <div class="legend-row">
        <div class="legend-dot" style="background:${tier.color}"></div>
        <div class="legend-label">${tier.label}</div>
        <div class="legend-pct">${pct}%</div>
      </div>
    `;
  }).join('');
}

function renderCombos(sortedCombos) {
  const container = document.getElementById('combo-grid');
  if (!container) return;
  if (sortedCombos.length === 0) {
    container.innerHTML = '<div class="empty-state">Not enough data yet.</div>';
    return;
  }
  container.innerHTML = sortedCombos.map(([combo, count], i) => {
    const parts = combo.split(' + ');
    const topColor = DRIVER_COLORS[parts[0]] || '#1a2744';
    return `
      <div class="combo-row">
        <div class="combo-rank">${i+1}</div>
        <div class="combo-drivers">
          <span style="color:${topColor};font-weight:500">${shortName(parts[0])}</span>
          <span class="combo-secondary"> + ${shortName(parts[1])}</span>
        </div>
        <div class="combo-count">${count}</div>
      </div>
    `;
  }).join('');
}

function renderRecent(rows) {
  const container = document.getElementById('recent-table');
  if (!container) return;
  if (rows.length === 0) {
    container.innerHTML = '<div class="empty-state">No completions yet.</div>';
    return;
  }
  const color = d => DRIVER_COLORS[d] || '#1a2744';
  container.innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Role</th>
          <th>Top Driver</th>
          <th>Secondary</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => `
          <tr>
            <td>${formatDate(r.timestamp)}</td>
            <td><span class="tier-badge">${shortTier(r.role_tier)}</span></td>
            <td><span class="driver-pill" style="background:${color(r.top_driver)}">${shortName(r.top_driver)}</span></td>
            <td><span class="driver-pill" style="background:${color(r.secondary)};opacity:0.8">${shortName(r.secondary)}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function formatDate(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  } catch { return ts.substring(0,10); }
}

function shortTier(tier) {
  const map = { 'Individual Contributor':'IC', 'People Manager':'Manager', 'Leader of Leaders':'LoL' };
  return map[tier] || tier;
}

function generateInsight(rows, sortedTop, tierCounts, total) {
  const topDriver = sortedTop[0][0];
  const topPct = Math.round((sortedTop[0][1]/total)*100);
  const mgrTotal = tierCounts['People Manager'] + tierCounts['Leader of Leaders'];
  const mgrPct = Math.round((mgrTotal/total)*100);

  if (total < 5) {
    return `You have ${total} completion${total===1?'':'s'} so far. Share the Driven link with your network to start seeing meaningful patterns. Insights will appear as data builds.`;
  }

  const insights = [];
  insights.push(`Across ${total} completions, ${topDriver} is the most common top driver at ${topPct}% of respondents.`);
  if (mgrPct > 50) {
    insights.push(`The majority of your respondents (${mgrPct}%) are in management roles, suggesting strong organizational adoption.`);
  } else {
    insights.push(`${mgrPct}% of respondents are in management roles.`);
  }
  if (sortedTop[0][1] > 0 && sortedTop[6][1] === 0) {
    insights.push(`${sortedTop[6][0]} has not appeared as a top driver yet in your sample.`);
  }
  return insights.join(' ');
}
</script>
